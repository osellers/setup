# Always launch fish in new panes/windows, regardless of the parent $SHELL.
# (Over SSH, $SHELL is often still bash even after chsh, so don't rely on it.)
set -g default-command fish

# Use Ctrl-a as the prefix instead of Ctrl-b.
# (Press Ctrl-a twice to send a literal Ctrl-a to the program in the pane.)
unbind C-b
set -g prefix C-a
bind C-a send-prefix
